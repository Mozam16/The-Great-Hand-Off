<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <!-- <link rel="stylesheet" href="test.css"> -->
    <title>Rock-Paper-Scissors</title>

</head>
<body>
    <main>
        <h1> ROCK PAPER SCISSORS</h1>

        <div class = "container">
                <header>
                    <span> COMPUTER<p class="computerChoice"></p></span>
                    <span> PLAYER<p class="playerChoice"></p></span>
                    
                </header>

                <div class="btn-container"> 

                    <div class="block1">
                        <span> RESULT<p class="result"></p></span>   
                    </div>

                    <div class="block2">
                        <button onclick="play('✊', this)">Rock✊</button>
                        <button onclick="play('✋', this)">Paper✋</button>
                        <button onclick="play('✌', this)" >Scissors✌</button>
                    </div>
                </div>
        </div>

    </main> 

<script src="RockPaperScissors.js"></script>

</body>
</html>
